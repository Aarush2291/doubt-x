// ═══════════════════════════════════════ ROBUST JSON PARSER ═══
// Handles: preamble text, [json] fences, trailing text, partial responses
function extractJSON(raw) {
  if (!raw) throw new Error('Empty AI response');
  
  // Step 1: strip markdown fences
  let s = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  
  // Step 2: try direct parse first
  try { return JSON.parse(s); } catch(e) {}
  
  // Step 3: find first { or [ and last } or ]
  const firstBrace = s.indexOf('{');
  const firstBracket = s.indexOf('[');
  
  let start = -1, endChar = '';
  if (firstBracket !== -1 && (firstBrace === -1 || firstBracket < firstBrace)) {
    start = firstBracket; endChar = ']';
  } else if (firstBrace !== -1) {
    start = firstBrace; endChar = '}';
  }
  
  if (start === -1) throw new Error('No JSON found in: ' + s.slice(0, 100));
  
  const end = s.lastIndexOf(endChar);
  if (end === -1 || end <= start) throw new Error('Malformed JSON structure');
  
  const extracted = s.slice(start, end + 1);
  try { return JSON.parse(extracted); } catch(e) {
    // Step 4: try to fix common issues - trailing commas, unescaped chars
    const fixed = extracted
      .replace(/,\s*([}\]])/g, '$1')  // trailing commas
      .replace(/([^\\])\n/g, '$1\\n') // unescaped newlines inside strings
      .replace(/([^\\])\t/g, '$1\\t'); // unescaped tabs
    try { return JSON.parse(fixed); } catch(e2) {
      throw new Error('JSON parse failed: ' + e2.message + ' | Raw: ' + s.slice(0, 200));
    }
  }
}

function $$(id){return document.getElementById(id);}
function setHTML(id,h){const e=$$(id);if(e)e.innerHTML=h;}
function show(id){const e=$$(id);if(e)e.classList.remove('hidden');}
function hide(id){const e=$$(id);if(e)e.classList.add('hidden');}
function dbk(s,c){return s+'::'+c;}
function notif(msg,ok=true){
  const d=document.createElement('div');
  d.className='fixed top-4 right-4 z-[9999] px-4 py-3 rounded-xl text-sm font-medium aup shadow-xl '+(ok?'bg-green-500/20 text-green-300 border border-green-500/30':'bg-red-500/20 text-red-300 border border-red-500/30');
  d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);
}

// Build theory context for AI
function theoryCtx(subject){
  let c='';
  Object.entries(S.theoryDB).filter(([k])=>!subject||k.startsWith(subject)).forEach(([k,chunks])=>{
    c+='\n['+k.replace('::','→')+']:\n'+chunks.slice(0,2).map(x=>x.slice(0,350)).join('\n')+'\n';
  });
  return c.slice(0,3500);
}
// Admin DB context
function adminCtx(){
  let c='=== DOUBTX DATABASE ===\n';
  c+='Users: '+S.users.length+'\n\nTHEORY:\n';
  Object.entries(S.theoryDB).forEach(([k,v])=>{c+=k+': '+v.length+' chunks. Sample: "'+v[0]?.slice(0,100)+'..."\n';});
  c+='\nQUESTIONS:\n';
  Object.entries(S.questDB).forEach(([k,v])=>{
    const up=v.filter(q=>!q._seed).length,pyp=v.filter(q=>q.isPYQ).length;
    c+=k+': '+v.length+' total ('+up+' uploaded, '+pyp+' PYP, '+v.filter(q=>q._seed).length+' seed)\n';
  });
  c+='\nPYP:\n';
  Object.entries(S.pypDB).forEach(([k,v])=>{c+=k+': '+v.length+' questions\n';});
  c+='\nMISSING (no uploaded content):\n';
  const mis=[];
  Object.entries(SYLLABUS).forEach(([s,chs])=>chs.forEach(ch=>{
    const k=dbk(s,ch);
    if(!(S.theoryDB[k]||[]).length&&!(S.questDB[k]||[]).filter(q=>!q._seed).length)mis.push(s+'→'+ch);
  }));
  c+=mis.slice(0,15).join(', ')+(mis.length>15?' +more':'');
  return c;
}
// ═══════════════════════════════════════ AUTH ═══
function doLogin(e,p){
  const u=S.users.find(u=>u.email===e&&u.phash===btoa(p));
  if(!u){notif('Invalid credentials',false);return;}
  S.user={...u};closeAuth();nav(u.role==='admin'?'admin':'dashboard');
}
function doSignup(n,e,p,code){
  if(!n||!e||!p){notif('Fill all fields',false);return;}
  if(S.users.find(u=>u.email===e)){notif('Email already used',false);return;}
  const role=code===ADMIN_CODE?'admin':'student';
  const u={uid:'u'+Date.now(),name:n,email:e,phash:btoa(p),role,joined:new Date().toISOString()};
  S.users.push(u);S.user={...u};dbSave();closeAuth();
  notif('Welcome, '+n+'!');nav(role==='admin'?'admin':'dashboard');
}

        <div class="flex flex-col gap-3 mb-5">
          <label class="flex items-center gap-3 p-3 bg-violet-500/8 border border-violet-500/20 rounded-xl cursor-pointer"><input type="checkbox" id="mg-ai" checked class="w-4 h-4 accent-violet-500"><div><p class="text-sm font-medium">AI-generate additional questions</p><p class="text-xs text-slate-400">Claude fills gaps beyond the question bank</p></div></label>
          <label class="flex items-center gap-3 p-3 bg-cyan-500/8 border border-cyan-500/20 rounded-xl cursor-pointer"><input type="checkbox" id="mg-pyp" class="w-4 h-4 accent-cyan-500"><div><p class="text-sm font-medium">Include PYP questions</p><p class="text-xs text-slate-400">Mix previous year questions into the mock</p></div></label>
        </div>
        <button onclick="mgGen()" id="mg-gbtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-violet-600 rounded-xl font-bold text-white hover:opacity-90 glow-v flex items-center justify-center gap-2"><i data-lucide="zap" class="w-5 h-5"></i> Generate Mock Test</button>
        <div id="mg-load" class="hidden text-center py-8"><div class="spinner mx-auto mb-3"></div><p class="text-slate-400 text-sm">Building mock from DB + AI...</p></div>
      </div></div>
    </div>
    <div id="mg-quiz" class="hidden">
      <div class="grid lg:grid-cols-4 gap-4">
        <div class="lg:col-span-1 bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
          <p id="mg-meta" class="text-xs text-slate-500 mb-3"></p>
          <div id="mg-pal" class="grid grid-cols-5 gap-1.5 mb-4"></div>
          <div class="mt-3 text-center"><p class="text-xs text-slate-400">Time Left</p><p id="mg-tmr" class="font-mono text-xl font-bold text-orange-400">--:--</p></div>
          <button onclick="mgSubAll()" class="mt-3 w-full py-2 bg-gradient-to-r from-blue-600 to-violet-600 text-white rounded-lg text-xs font-semibold">Submit Test</button>
        </div>
        <div class="lg:col-span-3 bg-slate-800/50 border border-slate-700/50 rounded-xl p-6">
          <div class="flex justify-between items-center mb-4"><span id="mg-qi" class="text-sm text-slate-400"></span><span id="mg-qt2" class="pill bg-violet-500/15 text-violet-300 text-xs"></span></div>
          <p id="mg-qt" class="text-slate-200 leading-relaxed mb-5"></p>
          <div id="mg-opts" class="space-y-3 mb-5"></div>
          <div class="flex gap-3 flex-wrap">
            <button onclick="mgSubmitAns()" id="mg-sbtn" class="px-5 py-2.5 bg-gradient-to-r from-blue-600 to-violet-600 text-white rounded-xl text-sm font-semibold">Submit</button>
            <button onclick="mgMark()" class="px-5 py-2.5 bg-violet-500/20 border border-violet-500/30 text-violet-300 rounded-xl text-sm hover:bg-violet-500/30">Mark Review</button>
            <button onclick="mgNext()" class="px-5 py-2.5 bg-slate-700 text-slate-300 rounded-xl text-sm hover:bg-slate-600 ml-auto">Next →</button>
          </div>
        </div>
      </div>
    </div>
    <div id="mg-result" class="hidden max-w-3xl mx-auto"></div>
  </section></div>`;}
function mgSetSub(s,btn){mgSub=s;document.querySelectorAll('#mg-subs button').forEach(b=>b.className='px-4 py-2 rounded-lg text-sm border transition-all border-slate-700 text-slate-300');btn.className='px-4 py-2 rounded-lg text-sm border transition-all border-blue-500 text-blue-300 bg-blue-500/10';mgRChaps();}
function mgRChaps(){const chs=SYLLABUS[mgSub]||[];mgChaps=new Set(chs);setHTML('mg-chaps',chs.map(c=>{const k=dbk(mgSub,c),cnt=(S.questDB[k]||[]).length;return `<label class="flex items-center gap-2 p-2.5 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-blue-500/40 transition-all"><input type="checkbox" checked class="w-4 h-4 accent-blue-500 mg-cc" value="${c}" onchange="mgTog('${c}',this.checked)"><span class="text-slate-300 text-xs flex-1">${c}</span>${cnt?`<span class="pill bg-green-500/15 text-green-400" style="padding:.1rem .4rem;font-size:.6rem">${cnt}</span>`:''}</label>`;}).join(''));}
function mgTog(c,on){on?mgChaps.add(c):mgChaps.delete(c);}
function mgAll(){mgChaps=new Set(SYLLABUS[mgSub]);document.querySelectorAll('.mg-cc').forEach(cb=>cb.checked=true);}
async function mgGen(){
  if(!mgChaps.size){notif('Select a chapter',false);return;}
  const cnt=parseInt($$('mg-cnt').value),diff=$$('mg-diff').value,timeMin=parseInt($$('mg-time').value);
  const useAI=$$('mg-ai').checked,usePYP=$$('mg-pyp').checked;
  hide('mg-gbtn');show('mg-load');
  let bq=[];for(const ch of mgChaps){const k=dbk(mgSub,ch);bq.push(...(S.questDB[k]||[]).filter(q=>usePYP||!q.isPYQ).map(q=>({...q,chapter:ch})));}
  bq=bq.sort(()=>Math.random()-.5);
  let final=bq.slice(0,Math.min(bq.length,Math.ceil(cnt*.65)));
  if(useAI&&final.length<cnt){const need=cnt-final.length,chs=[...mgChaps].join(', ');try{const raw=await ai(`Generate ${need} JEE MCQs for ${mgSub}: ${chs}. Difficulty: ${diff}. ONLY raw JSON array (start with [ immediately, no preamble):\n[{"q":"...","opts":["A","B","C","D"],"ans":0,"exp":"...","chapter":"name"}]`,`${need} ${diff} MCQs: ${mgSub}-${chs}`,2500);final=[...final,...extractJSON(raw).map(q=>({...q,subject:mgSub,_aiGen:true}))];}catch(e){}}
  final=final.slice(0,cnt).sort(()=>Math.random()-.5);
  if(!final.length){notif('No questions',false);hide('mg-load');show('mg-gbtn');return;}
  mockQs=final;mockS={cur:0,ans:{},reviewed:new Set(),done:false};
  let sl=timeMin*60;
  mockS.timer=setInterval(()=>{sl--;const el=$$('mg-tmr');if(!el){clearInterval(mockS.timer);return;}el.textContent=String(Math.floor(sl/60)).padStart(2,'0')+':'+String(sl%60).padStart(2,'0');el.className='font-mono text-xl font-bold '+(sl<300?'text-red-400':'text-orange-400');if(sl<=0){clearInterval(mockS.timer);mgSubAll();}},1000);
  hide('mg-load');hide('mg-config');show('mg-quiz');setHTML('mg-meta',mgSub+' • '+[...mgChaps].slice(0,2).join(', ')+(mgChaps.size>2?'…':''));mgLoadQ();lucide.createIcons();
}
function mgLoadQ(){const q=mockQs[mockS.cur];setHTML('mg-qi',`Q${mockS.cur+1}/${mockQs.length}`);setHTML('mg-qt2',(q.chapter||'')+(q.isPYQ?' • PYP':q._aiGen?' • AI':' • Bank'));setHTML('mg-qt',q.q);$$('mg-sbtn').disabled=false;$$('mg-sbtn').textContent='Submit';setHTML('mg-opts',q.opts.map((o,i)=>`<div class="opt-row ${mockS.ans[mockS.cur]===i?'opt-sel':''}" onclick="mgSel(${i})"><div class="opt-lbl">${['A','B','C','D'][i]}</div><span class="text-sm text-slate-300">${o}</span></div>`).join(''));mgPal();}
function mgSel(i){if(mockS.done)return;mockS.ans[mockS.cur]=i;mgLoadQ();}
function mgSubmitAns(){if(mockS.ans[mockS.cur]===undefined){notif('Pick option',false);return;}mockS.done=true;const q=mockQs[mockS.cur],ch=mockS.ans[mockS.cur];document.querySelectorAll('#mg-opts .opt-row').forEach((el,i)=>{el.style.cursor='not-allowed';if(i===q.ans)el.classList.add('opt-ok');else if(i===ch)el.classList.add('opt-bad');});$$('mg-sbtn').disabled=true;$$('mg-sbtn').textContent=ch===q.ans?'✓ Correct':'✗ Wrong';mgPal();}
function mgNext(){if(mockS.cur<mockQs.length-1){mockS.cur++;mockS.done=false;mgLoadQ();}else mgSubAll();}
function mgMark(){mockS.reviewed.has(mockS.cur)?mockS.reviewed.delete(mockS.cur):mockS.reviewed.add(mockS.cur);mgPal();}
function mgPal(){const{cur,ans,reviewed}=mockS;setHTML('mg-pal',mockQs.map((_,i)=>{let c=`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold cursor-pointer `;c+=i===cur?'bg-blue-500 text-white ring-2 ring-blue-300':reviewed.has(i)?'bg-violet-500/30 border border-violet-500 text-violet-300':ans[i]!==undefined?'bg-green-500/30 border border-green-500 text-green-300':'bg-slate-600 text-slate-300';return `<div class="${c}" onclick="mgJ(${i})">${i+1}</div>`;}).join(''));}
function mgJ(i){mockS.cur=i;mockS.done=mockS.ans[i]!==undefined;mgLoadQ();if(mockS.done){const q=mockQs[i],ch=mockS.ans[i];document.querySelectorAll('#mg-opts .opt-row').forEach((el,idx)=>{el.style.cursor='not-allowed';if(idx===q.ans)el.classList.add('opt-ok');else if(idx===ch)el.classList.add('opt-bad');});}}
function mgSubAll(){
  clearInterval(mockS.timer);const total=mockQs.length,answered=Object.keys(mockS.ans).length;
  const correct=Object.entries(mockS.ans).filter(([i,a])=>mockQs[i].ans===a).length;
  const wrong=answered-correct,marks=correct*4-wrong,pct=Math.round(correct/total*100);
  const cm={};mockQs.forEach((q,i)=>{const ch=q.chapter||'?';if(!cm[ch])cm[ch]={t:0,c:0};cm[ch].t++;if(mockS.ans[i]===q.ans)cm[ch].c++;});
  hide('mg-quiz');show('mg-result');
  setHTML('mg-result',`<div class="text-center mb-8"><div class="w-16 h-16 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center mx-auto mb-4"><i data-lucide="trophy" class="w-8 h-8 text-white"></i></div><h2 class="text-3xl font-bold mb-1">Mock Complete!</h2><p class="text-slate-400">${mgSub}</p></div>
    <div class="grid grid-cols-4 gap-3 mb-5"><div class="bg-green-500/10 border border-green-500/30 rounded-xl p-4 text-center"><p class="text-xs text-slate-400">Correct</p><p class="text-2xl font-bold text-green-400">${correct}</p></div><div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-center"><p class="text-xs text-slate-400">Wrong</p><p class="text-2xl font-bold text-red-400">${wrong}</p></div><div class="bg-slate-700/50 rounded-xl p-4 text-center"><p class="text-xs text-slate-400">Skipped</p><p class="text-2xl font-bold">${total-answered}</p></div><div class="bg-blue-500/10 border border-blue-500/30 rounded-xl p-4 text-center"><p class="text-xs text-slate-400">Score</p><p class="text-2xl font-bold text-blue-400">${marks}</p></div></div>
    <div class="bg-slate-800 rounded-full h-3 mb-2"><div class="bg-gradient-to-r from-blue-500 to-violet-600 h-3 rounded-full" style="width:${pct}%"></div></div>
    <p class="text-slate-400 text-center mb-6">${pct}% accuracy</p>
    <div class="mb-6"><h3 class="text-sm font-semibold text-slate-300 mb-3">Chapter-wise Breakdown</h3><div class="space-y-2">${Object.entries(cm).map(([ch,d])=>{const cp=Math.round(d.c/d.t*100),col=cp>=70?'green':cp>=40?'yellow':'red';return `<div class="flex items-center gap-3 p-3 bg-slate-800/50 rounded-xl"><span class="text-sm text-slate-300 flex-1 truncate">${ch}</span><div class="w-24 bg-slate-700 rounded-full h-2 flex-shrink-0"><div class="bg-${col}-500 h-2 rounded-full" style="width:${cp}%"></div></div><span class="text-xs text-slate-400 w-16 text-right">${d.c}/${d.t} (${cp}%)</span></div>`;}).join('')}</div></div>
    <div class="text-center"><button onclick="mgReset()" class="px-8 py-3 bg-gradient-to-r from-blue-600 to-violet-600 rounded-xl font-semibold text-white hover:opacity-90">Generate Another</button></div>`);
  lucide.createIcons();
}
function mgReset(){mockQs=[];show('mg-config');hide('mg-result');show('mg-gbtn');hide('mg-load');}
// ═══════════════════════════════════════ RENDER ═══
function render(){
  // Clear any running timers from previous page
  try{
    if(typeof cbtS!=='undefined'&&cbtS.timer){clearInterval(cbtS.timer);cbtS.timer=null;}
    if(typeof mockS!=='undefined'&&mockS.timer){clearInterval(mockS.timer);mockS.timer=null;}
  }catch(e){}
  const app=document.getElementById('app'),p=S.page;
  if(!S.user)app.innerHTML=renderLanding();
  else if(p==='dashboard')app.innerHTML=renderDashboard();
  else if(p==='admin')app.innerHTML=renderAdmin();
  else if(p==='doubt-solver')app.innerHTML=renderDoubtSolver();
  else if(p==='youtube')app.innerHTML=renderYoutube();
  else if(p==='pyp')app.innerHTML=renderPYP();
  else if(p==='cbt')app.innerHTML=renderCBT();
  else if(p==='mock')app.innerHTML=renderMock();
  else app.innerHTML=renderDashboard();
  lucide.createIcons();
  try{
    if(p==='admin'){admChaps();setTimeout(()=>{if($$('atab-content'))aTab('content');},0);}
    if(p==='cbt')cbtChaps();
    if(p==='mock')mgRChaps();
  }catch(e){console.warn('post-render init error:',e);}
}
// ═══════════════════════════════════════ INIT ═══
(function(){
  try{
    const saved=dbLoad();
    if(saved){
      if(saved.users)S.users=saved.users;
      if(saved.theoryDB)S.theoryDB=saved.theoryDB;
      if(saved.questDB)S.questDB=saved.questDB;
      if(saved.pypDB)S.pypDB=saved.pypDB;
      console.log('✓ DoubtX DB loaded from localStorage. Users:'+S.users.length+' Questions:'+Object.values(S.questDB).reduce((a,v)=>a+v.length,0));
    }
  }catch(e){console.warn('DB load failed, starting fresh:',e);}
  try{initSeed();}catch(e){console.warn('Seed init failed:',e);}
  try{render();}catch(e){
    console.error('Render error:',e);
    document.getElementById('app').innerHTML='<div style="padding:2rem;color:#f87171;font-family:monospace;background:#0f172a;min-height:100vh;"><h2>DoubtX Error</h2><p>'+e.message+'</p><p style="color:#64748b;font-size:.85em">'+e.stack+'</p><button onclick="localStorage.clear();location.reload()" style="margin-top:1rem;padding:.5rem 1rem;background:#ef4444;color:white;border:none;border-radius:.5rem;cursor:pointer;">Clear DB & Reload</button></div>';
  }
})();
</script>
</body>
